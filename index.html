<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    .navbar {
      width: 100%;
      height: 60px;
      background: #333;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 20px;
    }
    .container {
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 200px;
      background: #eee;
      padding: 20px;
    }
    .content {
      flex: 1;
      padding: 20px;
      background: #fafafa;
    }
  </style>
</head>
<body>
  <div class="navbar">Navbar</div>
  <div class="container">
    <div class="sidebar">Sidebar</div>
    <div class="content">Content</div>
  </div>
</body>
</html>
